name: Build and release client
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-upload:
    needs: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install
      - name: Lint check
        run: pnpm run lint:check
      - name: Format check
        run: pnpm run format:check
      - name: Build
        run: pnpm run build
      - name: Package artifact
        run: |
          mkdir -p tmp/client
          cp LICENSE tmp/client/
          cp -r dist tmp/client/
          cd tmp
          zip -X -r plugnmeet-client.zip client
          sha256sum plugnmeet-client.zip > plugnmeet-client.zip.sha256
      - name: Upload to release
        if: needs.release-please.outputs.release_created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd tmp
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            plugnmeet-client.zip \
            plugnmeet-client.zip.sha256
      - name: Upload as pre-release
        if: needs.release-please.outputs.release_created != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="v$(node -p "require('./package.json').version")-beta.${SHORT_SHA}"
          cd tmp
          gh release create "$TAG" \
            plugnmeet-client.zip \
            plugnmeet-client.zip.sha256 \
            --prerelease \
            --title "Beta build ${TAG}" \
            --notes "Automated beta build from commit ${GITHUB_SHA}"
